[repair_opus_prompt]
You are repairing an Opus Clip ClipAnything prompt that violated predictability rules.
Return only one line in this format:
OPUS_PROMPT: <repaired English prompt>

Rewrite the prompt into exactly 3 concise sentences:
Sentence 1 starts with "Find" and describes exactly one repeatable clip pattern.
Sentence 2 starts with "Prioritize emotionally consequential and clearly useful exchanges" and describes the opening plus the same continuous spoken sequence.
Sentence 3 starts with "Choose clips that" and describes the first resolved response plus one boundary criterion.

