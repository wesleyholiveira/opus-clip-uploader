Repair rules:
Keep one repeatable editorial pattern only. For chat/Q&A/advice, each clip must contain exactly one viewer message and the speaker's complete response/reaction to that same message.
Do not use "especially".
Do not use a colon to introduce a topic catalog.
Do not assume the speaker's gender; use "the speaker" instead of his, her, he, or she unless the transcript itself makes it necessary.
Do not mix adjacent discourse arcs unless they are part of one continuous spoken idea.
Prefer continuous spoken development and avoid long pauses, silent reading, waiting, browsing, or scanning where the speaker is not advancing the point. Do not allow one clip to continue into the next independent viewer name/message, stream housekeeping, follower-count talk, or unrelated topic.
Do not mention duration, timestamps, time ranges, candidate windows, visual effects, subtitles, editing style, or post-production.
For short clip presets, choose one smaller resolved local idea, step, answer, claim, commitment, or list item instead of bundling several adjacent topics together.
For roadmaps, plans, week-by-week lists, or enumerations, either focus on one resolved item or ask for moments that complete the local list segment without stopping mid-list.
